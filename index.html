
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENU UTAMA PREMIUM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#000;
position:relative;
}

/* BACKGROUND CERAH */

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(
rgba(0,0,0,.05),
rgba(0,0,0,.20)
),
url("https://images.unsplash.com/photo-1577223625816-7546f13df25d?q=80&w=3840&auto=format&fit=crop")
center center/cover no-repeat;

filter:
brightness(1.8)
contrast(1.25)
saturate(1.5);

animation:bgZoom 20s linear infinite alternate;
z-index:-10;
}

@keyframes bgZoom{
from{transform:scale(1);}
to{transform:scale(1.12);}
}

/* LIGHT */

body::after{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 50% 10%,rgba(0,255,255,.55),transparent 30%),
radial-gradient(circle at 20% 0%,rgba(0,170,255,.45),transparent 40%),
radial-gradient(circle at 80% 0%,rgba(0,170,255,.45),transparent 40%);

z-index:-9;
}

/* PARTICLE */

.particles{
position:fixed;
inset:0;
overflow:hidden;
z-index:-8;
}

.particles span{
position:absolute;
width:4px;
height:4px;
background:#00eaff;
border-radius:50%;
box-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;
animation:particleMove linear infinite;
}

@keyframes particleMove{
from{
transform:translateY(0) scale(0);
opacity:0;
}
10%{opacity:1;}
to{
transform:translateY(-120vh) scale(1);
opacity:0;
}
}

/* CARD */

.menu-box{
width:100%;
max-width:450px;
padding:40px 30px;
border-radius:30px;
text-align:center;

background:rgba(0,30,80,.20);

backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 30px rgba(0,200,255,.7),
0 0 80px rgba(0,200,255,.4);

animation:floating 4s ease-in-out infinite;
}

@keyframes floating{
50%{
transform:translateY(-12px);
}
}

.logo{
font-size:70px;
margin-bottom:10px;
filter:drop-shadow(0 0 20px #00eaff);
}

h1{
font-size:34px;
font-weight:900;
letter-spacing:2px;

background:
linear-gradient(
90deg,
#fff,
#00eaff,
#fff);

background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleMove 4s linear infinite;
}

@keyframes titleMove{
to{
background-position:200%;
}
}

.subtitle{
margin-top:10px;
margin-bottom:30px;
color:#dbeafe;
font-size:14px;
letter-spacing:2px;
}

.menu-link{
display:flex;
justify-content:center;
align-items:center;

text-decoration:none;
color:white;

padding:18px;
margin:15px 0;

font-size:18px;
font-weight:800;

border-radius:18px;

position:relative;
overflow:hidden;

transition:.3s;
}

.menu-link:hover{
transform:translateY(-5px) scale(1.03);
}

.menu-link::before{
content:"";
position:absolute;
top:0;
left:-150%;
width:80%;
height:100%;
background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.4),
transparent);
transform:skewX(-25deg);
}

.menu-link:hover::before{
animation:shine .8s forwards;
}

@keyframes shine{
to{
left:180%;
}
}

.bola{
background:
linear-gradient(
135deg,
#16a34a,
#22c55e,
#86efac);
box-shadow:0 0 25px rgba(34,197,94,.6);
}

.jarvis{
background:
linear-gradient(
135deg,
#2563eb,
#7c3aed,
#38bdf8);
box-shadow:0 0 25px rgba(59,130,246,.6);
}

.footer{
margin-top:25px;
font-size:12px;
color:#dbeafe;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:#020617;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:9999;
transition:.8s;
}

#loader.hide{
opacity:0;
visibility:hidden;
}

.loader-logo{
font-size:90px;
animation:pulse 1.5s infinite;
}

.loader-text{
margin-top:15px;
font-size:18px;
letter-spacing:4px;
color:#00eaff;
}

@keyframes pulse{
50%{
transform:scale(1.2);
filter:drop-shadow(0 0 40px #00eaff);
}
}

@media(max-width:480px){

.menu-box{
padding:30px 20px;
}

h1{
font-size:28px;
}

.menu-link{
font-size:16px;
}

}
</style>
</head>

<body>

<div id="loader">
<div class="loader-logo">🏆</div>
<div class="loader-text">LOADING...</div>
</div>

<div class="particles"></div>

<div class="menu-box">

<div class="logo">🏆</div>

<h1>⚡ WELCOME ⚡</h1>

<div class="subtitle">
</div>

<a class="menu-link bola"
href="https://bocill2003.github.io/BOLA/"
target="_blank">
⚽ MENU BOLA
</a>

<a class="menu-link jarvis"
href="https://bocill2003.github.io/JARVIS/"
target="_blank">
🤖 MENU JARVIS
</a>

<a class="menu-link jarvis"
href="https://bocill2003.github.io/GENERATOR/"
target="_blank">
🤖 MENU JARVIS
</a>

<div class="footer">
J A R V I S
</div>

</div>

<script>

window.addEventListener("load",()=>{

setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},1500);

});

const particles=document.querySelector(".particles");

for(let i=0;i<100;i++){

const span=document.createElement("span");

span.style.left=Math.random()*100+"%";
span.style.bottom="-20px";
span.style.animationDelay=Math.random()*10+"s";
span.style.animationDuration=(8+Math.random()*12)+"s";

particles.appendChild(span);

}

</script>

</body>
</html>
